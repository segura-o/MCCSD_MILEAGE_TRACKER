<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mileage Lookup Tool</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #dbe3ef;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    select, button {
      font-size: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    select {
      min-width: 280px;
      background: white;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      color: white;
      border: none;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: #f8fafc;
    }

    button.danger {
      background: var(--danger);
    }

    .route-display {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.6;
      word-break: break-word;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    ul {
      padding-left: 20px;
      margin-bottom: 0;
    }

    .total {
      font-size: 24px;
      font-weight: 700;
      margin-top: 16px;
    }

    .warning {
      margin-top: 12px;
      color: var(--danger);
      font-weight: 600;
    }

    .logo {
      display: block;
      width: min(100%, 520px);
      height: auto;
      margin: 10px auto 0;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Mileage Lookup Tool</h1>

    <div class="controls">
      <select id="locationSelect"></select>
      <button id="addStopBtn">Add Stop</button>
      <button id="removeLastBtn" class="secondary">Remove Last</button>
      <button id="clearRouteBtn" class="danger">Clear Route</button>
    </div>
  </div>

  <div class="card">
    <h2>Current Route</h2>
    <div id="routeDisplay" class="route-display empty">No stops added yet.</div>
  </div>

  <div class="card">
    <h2>Breakdown</h2>
    <div id="breakdown" class="empty">Add at least 2 stops to calculate mileage.</div>
    <div id="totalMiles" class="total"></div>
    <div id="warning" class="warning"></div>
  </div>

  <img
          class="logo"
          src="https://resources.finalsite.net/images/f_auto,q_auto,t_image_size_2/v1718025213/mccsdnet/bfwy7wkktbpw6rr9j7jh/MC-Header.png"
          alt="MCCSD logo"
  />
</div>

  const route = [];

  const locationSelect = document.getElementById('locationSelect');
  const addStopBtn = document.getElementById('addStopBtn');
  const removeLastBtn = document.getElementById('removeLastBtn');
  const clearRouteBtn = document.getElementById('clearRouteBtn');
  const routeDisplay = document.getElementById('routeDisplay');
  const breakdown = document.getElementById('breakdown');
  const totalMiles = document.getElementById('totalMiles');
  const warning = document.getElementById('warning');

  function populateDropdown() {
    locationSelect.innerHTML = '';

    Object.keys(locations).forEach((code) => {
      const option = document.createElement('option');
      option.value = code;
      option.textContent = code;
      locationSelect.appendChild(option);
    });
  }

  function addStop() {
    const selected = locationSelect.value;
    if (!selected) return;

    route.push(selected);
    renderRoute();
  }

  function removeLastStop() {
    route.pop();
    renderRoute();
  }

  function clearRoute() {
    route.length = 0;
    renderRoute();
  }

  function formatLocation(code) {
    return code;
  }

  function formatMiles(value) {
    return parseFloat(value.toFixed(1));
  }

  function renderRoute() {
    warning.textContent = '';

    if (route.length === 0) {
      routeDisplay.textContent = 'No stops added yet.';
      routeDisplay.className = 'route-display empty';
      breakdown.textContent = 'Add at least 2 stops to calculate mileage.';
      breakdown.className = 'empty';
      totalMiles.textContent = '';
      return;
    }

    routeDisplay.textContent = route.map(code => code).join(' → ');
    routeDisplay.className = 'route-display';

    if (route.length < 2) {
      breakdown.textContent = 'Add at least 2 stops to calculate mileage.';
      breakdown.className = 'empty';
      totalMiles.textContent = '';
      return;
    }

    let total = 0;
    const breakdownItems = [];

    for (let i = 0; i < route.length - 1; i++) {
      const from = route[i];
      const to = route[i + 1];
      const miles = mileageTable[from]?.[to];

      if (miles === undefined) {
        warning.textContent = `Missing mileage for ${from} → ${to}. Add that value to mileageTable.`;
        breakdown.innerHTML = breakdownItems.length
                ? `<ul>${breakdownItems.map(item => `<li>${item}</li>`).join('')}</ul>`
                : '<span class="empty">Mileage breakdown unavailable.</span>';
        totalMiles.textContent = '';
        return;
      }

      total += miles;
      breakdownItems.push(`${formatLocation(from)} → ${formatLocation(to)} = ${formatMiles(miles)} miles`);
    }

    breakdown.innerHTML = `<ul>${breakdownItems.map(item => `<li>${item}</li>`).join('')}</ul>`;
    breakdown.className = '';
    totalMiles.textContent = `Total: ${formatMiles(total)} miles`;
  }

  addStopBtn.addEventListener('click', addStop);
  removeLastBtn.addEventListener('click', removeLastStop);
  clearRouteBtn.addEventListener('click', clearRoute);

  populateDropdown();
  renderRoute();
</script>

</html>
